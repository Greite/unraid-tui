version: 2

project_name: unraid-tui

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: unraid-tui
    main: .
    binary: unraid-tui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Greite/unraid-tui/cmd.version={{.Version}}
      - -X github.com/Greite/unraid-tui/cmd.commit={{.ShortCommit}}
      - -X github.com/Greite/unraid-tui/cmd.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: Greite
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Greite/unraid-tui"
    description: "Terminal UI for monitoring and managing Unraid servers"
    license: "MIT"
    install: |
      bin.install "unraid-tui"
    test: |
      system bin/"unraid-tui", "--help"

release:
  github:
    owner: Greite
    name: unraid-tui
